name: Build Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      working-directory: ./sukar
      run: npm install --legacy-peer-deps
      
    - name: Build web app
      working-directory: ./sukar
      env:
        CI: false
      run: npx vite build client --outDir dist && npx esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
        
    - name: Sync Capacitor
      working-directory: ./sukar
      run: npx cap sync android
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      working-directory: ./sukar/android
      run: chmod +x gradlew
      
    - name: Build APK
      working-directory: ./sukar/android
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: sukar/android/app/build/outputs/apk/release/*.apk
