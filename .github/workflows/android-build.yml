name: Build Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Enable Corepack
      run: corepack enable
        
    - name: Install dependencies
      working-directory: ./sukar
      run: pnpm install --no-frozen-lockfile
      
    - name: Build web app
      working-directory: ./sukar
      run: pnpm build
      
    - name: Sync Capacitor
      working-directory: ./sukar
      run: pnpm cap sync android
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      working-directory: ./sukar/android
      run: chmod +x gradlew
      
    - name: Build APK
      working-directory: ./sukar/android
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: sukar/android/app/build/outputs/apk/release/*.apk
